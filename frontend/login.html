<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <!-- Linkando o arquivo CSS externo -->
    <link rel="stylesheet" href="style_login.css">
    
</head>
<body>

    <!-- Container principal -->
    <div class="container">

        <!-- Logo / Nome da marca -->
        <h1 class="logo">Perfumaria</h1>

        <!-- Caixa do formulário -->
        <div class="login">

            <!-- Saudação -->
            <h2>Olá!</h2>
            <p>Para continuar, digite seu e-mail</p>

            <!-- Formulário -->
            <form>

                <!-- Grupo do input -->
                <div class="input-group">

                    <!-- Campo de email -->
                    <input type="email" placeholder="Digite seu email" required>

                    <!-- Mensagem de erro -->
                    <span class="erro">⚠ Campo obrigatório.</span>

                </div>

                <!-- Link recuperar email -->
                <a href="#" class="link-email">Esqueci meu e-mail</a>

                <!-- Botão continuar -->
                <button type="submit">Continuar</button>

            </form>

            <!-- Linha divisória -->
            <div class="divisoria">
                <span>ou utilize sua conta</span>
            </div>

            <!-- Botão Google -->
            <button class="google-btn">
                G Google
            </button>

            <!-- Texto rodapé -->
            <p class="captcha">
                Protegido por reCAPTCHA - Privacidade | Condições
            </p>

        </div>

        <!-- Links inferiores -->
        <div class="links">
            <a href="#">Política de privacidade</a>
            <a href="#">Relacionamento com o cliente</a>
        </div>

    </div>

</body>
</html>
